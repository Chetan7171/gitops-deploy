{{- if .Values.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "app-service.fullname" . }}
  annotations:
    kubernetes.io/ingress.class: alb
spec:
  rules:
    - host: {{ .Values.ingress.hosts | first | .host }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ include "app-service.fullname" . }}
                port:
                  number: 8080
{{- end }}
